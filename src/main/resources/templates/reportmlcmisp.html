<!DOCTYPE html>
<html dir="rtl" lang="ar" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title> نموذج بلاغ عن شخص مفقود</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet"/>
    <style>
        .form-label { font-weight: bold; }
        .error-msg { color: red; font-size: 0.9em; display: none; }
        .field-error { background-color: #ffe5e5; }
        .alert-msg { color: red; font-weight: bold; display: none; text-align: center; margin-top: 10px; }
    </style>
</head>
<body class="bg-light p-4">
<div class="container">
    <h2 class="mb-4 text-center">نموذج بلاغ عن شخص مفقود </h2>

    <div th:if="${successMessage}" class="alert alert-success text-center">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger text-center">
        <span th:text="${errorMessage}"></span>
    </div>

    <form class="row g-3 needs-validation" enctype="multipart/form-data" id="missingForm" method="post" novalidate th:action="@{/missing/create}" th:object="${missing}">

        <!-- hidden tracking fields -->
        <input type="hidden" th:field="*{reporterCode}" id="reporterCode">
        <input type="hidden" th:field="*{createdBy}" id="createdBy">

        <!-- الاسم -->
        <div class="col-md-4">
            <label class="form-label">الاسم الأول</label>
            <input class="form-control required" id="firstName" required th:field="*{firstName}" type="text"/>
            <div class="text-danger small" id="error-firstName" style="display:none;">الاسم يجب أن لا يقل عن حرفين</div>
        </div>
        <div class="col-md-4">
            <label class="form-label">الاسم الثاني</label>
            <input class="form-control required" id="secondName" required th:field="*{secondName}" type="text"/>
            <div class="text-danger small" id="error-secondName" style="display:none;">الاسم يجب أن لا يقل عن حرفين</div>
        </div>
        <div class="col-md-4">
            <label class="form-label">الاسم الثالث</label>
            <input class="form-control required" id="familyName" required th:field="*{familyName}" type="text"/>
            <div class="text-danger small" id="error-familyName" style="display:none;">الاسم يجب أن لا يقل عن حرفين</div>
        </div>

        <!-- بيانات شخصية -->
        <div class="col-md-4">
            <label class="form-label">الجنس</label>
            <select class="form-select required" required th:field="*{gender}">
                <option value="">اختر</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
        </div>
        <div class="col-md-4">
        <label class="form-label">الجنسية</label>
        <input class="form-control required" id="nationality" required th:field="*{nationality}" type="text"/>
        <div class="text-danger small" id="error-nationality" style="display:none;">البيان مطلوب</div>
        </div>

        <div class="col-md-4">
            <label class="form-label">الرقم القومي</label>
            <input class="form-control required" id="nationalId" pattern="\d{14}" required th:field="*{nationalId}" type="text"/>
            <div class="text-danger small" id="error-nationalId" style="display:none;">الرقم القومي يجب أن يتكون من 14 رقمًا</div>
        </div>
        <div class="col-md-4">
            <label class="form-label">تاريخ الميلاد</label>
            <input class="form-control required" required th:field="*{dob}" type="date"/>
        </div>
        <div th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}" class="text-danger small"></div>

        <!-- عنوان الغائب -->
   <!--     <div class="col-12"><h5>عنوان الغائب</h5></div>  -->
        <div class="row mt-3">
            <div class="col-md-2">
                <label class="form-label" style="font-size: 0.9rem;">عنوان الغائب..الدولة</label>
<!---                <input class="form-control required" required th:field="*{country}" type="text" value="مصر" readonly/>  -->
                <input type="text" class="form-control required" th:field="*{country}" th:value="${missing.country ?: 'مصر'}" required>
            </div>
            <div class="col-md-2">
                <label for="homeGovernorate" class="form-label">المحافظة</label>
                <select id="homeGovernorate" class="form-select required" required>
                    <option value="">اختر المحافظة...</option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="homeCity" class="form-label">المدينة</label>
                <select id="homeCity" class="form-select required" required>
                    <option value="">اختر المدينة...</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="homeDistrict" class="form-label">الحي/المنطقة</label>
                <select id="homeDistrict" class="form-select">
                    <option value="">إختر الحي/المنطقة (اختياري)</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">العنوان</label>
                <input class="form-control required" required th:field="*{address}" type="text"/>
            </div>
        </div>
        <!-- Hidden inputs bound to the model -->
        <input type="hidden" th:field="*{government}" id="homeGovernorateName">
        <input type="hidden" th:field="*{city}" id="homeCityName">
        <input type="hidden" th:field="*{district}" id="homeDistrictName">

        <!-- تواصل -->
        <div class="col-md-4">
            <label class="form-label">هاتف أرضي</label>
            <input type="tel" class="form-control required" th:field="*{landline}" pattern="\d+" title="أرقام فقط" maxlength="15" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">موبايل</label>
            <input type="tel" class="form-control required" th:field="*{mobile}" pattern="\d+" title="أرقام فقط" maxlength="15" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">صلة صاحب البلاغ بالغائب</label>
            <select class="form-select required" required th:field="*{reporterRelation}">
                <option value="">اختر</option>
                <option value="الوالد">الوالد</option>
                <option value="الأم">الأم</option>
                <option value="الأخ">الأخ</option>
                <option value="الأخت">الأخت</option>
                <option value="الزوج">الزوج</option>
                <option value="الزوجة">الزوجة</option>
                <option value="قريب">قريب</option>
                <option value="صديق">صديق</option>
                <option value="جار">جار</option>
            </select>
            <div th:if="${#fields.hasErrors('reporterRelation')}" th:errors="*{reporterRelation}" class="text-danger small"></div>
        </div>

        <!-- مكان الفقد -->
        <div class="row mt-3">
            <div class="col-md-2">
                <label class="form-label">مكان الفقد..الدولة</label>
<!---                <input class="form-control required" required th:field="*{lastSeenCountry}" type="text" value="مصر"> --->
                <input type="text" class="form-control required" th:field="*{lastSeenCountry}" th:value="${missing.lastSeenCountry ?: 'مصر'}" required>
            </div>
            <div class="col-md-2">
                <label for="lostGovernorate" class="form-label">المحافظة</label>
                <select id="lostGovernorate" class="form-select required" required>
                    <option value="">اختر المحافظة...</option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="lostCity" class="form-label">المدينة</label>
                <select id="lostCity" class="form-select required" required>
                    <option value="">اختر المدينة...</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="lostDistrict" class="form-label">الحي/المنطقة</label>
                <select id="lostDistrict" class="form-select">
                    <option value="">إختر الحي/المنطقة (اختياري)</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">العنوان</label>
                <input class="form-control required" required th:field="*{lastSeenLocation}" type="text"/>
            </div>
        </div>
        <!-- Hidden inputs bound to the model -->
        <input type="hidden" th:field="*{lastSeenGovernorate}" id="lostGovernorateName">
        <input type="hidden" th:field="*{lastSeenCity}" id="lostCityName">
        <input type="hidden" th:field="*{lastSeenDistrict}" id="lostDistrictName">
        <input type="hidden" th:field="*{createdIp}" id="createdIp">
        <input type="hidden" th:field="*{activatedIp}" id="activatedIp">
        <input type="hidden" th:field="*{deactivatedIp}" id="deactivatedIp">


        <!-- معلومات إضافية -->
        <div class="col-md-4">
            <label class="form-label">تاريخ الفقد</label>
            <input class="form-control required" required th:field="*{lastSeenDate}" type="date"/>
        </div>
        <div class="col-md-4">
            <label class="form-label">السن عند الفقد</label>
            <input class="form-control required" required th:field="*{age}" type="number"/>
        </div>
        <div class="col-md-4">
            <label class="form-label">الحالة الصحية</label>
            <select class="form-select required" required th:field="*{healthStatus}">
                <option value="">اختر</option>
                <option value="جيدة">جيدة</option>
                <option value="معاق">معاق</option>
                <option value="معاق ذهنيا">معاق ذهنيا</option>
                <option value="توحد">توحد</option>
                <option value="مريض نفسى">مريض نفسى</option>
                <option value="سكر">سكر</option>
                <option value="ضغط">ضغط</option>
            </select>
        </div>

        <!-- المستندات -->
        <div class="col-md-3">
            <label class="form-label">نوع مستند الفقد الرسمى</label>
           <input type="text" name="documentType" class="form-control">
<!---            <input type="text" name="documentType" class="form-control required" required>  -->
        </div>
        <div class="col-md-3">
            <label class="form-label">رقم المستند</label>
           <input type="text" name="documentNumber" class="form-control">
<!---            <input type="text" name="documentNumber" class="form-control required" required>  --->

        </div>
        <div class="col-md-3">
            <label class="form-label">صادر من</label>
            <input type="text" name="documentIssuedBy" class="form-control">
<!----            <input type="text" name="documentIssuedBy" class="form-control required" required> -->
        </div>
        <div class="col-md-3">
            <label class="form-label">تاريخ المستند</label>
            <input type="date" name="documentDate" class="form-control">
<!---            <input type="date" name="documentDate" class="form-control required" required>  -->
        </div>

        <!-- الصور -->
        <div class="row mt-3">
            <div class="col-md-4">
                <label class="form-label">صورة المستند</label>
                <input type="file" name="document" id="documentFile" class="form-control required" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">صورة الغائب (اختياري)</label>
                <input type="file" name="photo" id="photo" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">تاريخ صورة الغائب (إختيارى)</label>
                <input type="date" name="photoDate" id="photoDate" class="form-control" disabled>
            </div>
        </div>

        <!--77 الأزرار -->
        <div class="col-12 mt-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <button type="submit" id="submitBtn" class="btn btn-primary px-4" disabled>إرسال البلاغ</button>
                <button type="button" id="clearBtn" class="btn btn-secondary px-4">مسح</button>
                <small style="font-size: 11px; color: gray;">reportmlcmisp.html</small>
                <a href="/#missingreport" class="btn btn-outline-dark px-4">رجوع</a>
            </div>
        </div>

        <div class="col-12">
            <div id="formAlert" class="alert-msg"></div>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById('missingForm');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const alertBox = document.getElementById('formAlert');
    const requiredFields = form.querySelectorAll('.required');

    function validateForm() {
        let valid = true;
        requiredFields.forEach(field => {
            const id = field.getAttribute('id');
            if (id === 'firstName' || id === 'secondName' || id === 'familyName') {
                if (field.value.trim().length < 2) {
                    field.classList.add('field-error');
                    document.getElementById(`error-${id}`).style.display = 'block';
                    valid = false;
                } else {
                    field.classList.remove('field-error');
                    document.getElementById(`error-${id}`).style.display = 'none';
                }
            } else if (id === 'nationalId') {
                if (!/^\d{14}$/.test(field.value.trim())) {
                    field.classList.add('field-error');
                    document.getElementById('error-nationalId').style.display = 'block';
                    valid = false;
                } else {
                    field.classList.remove('field-error');
                    document.getElementById('error-nationalId').style.display = 'none';
                }
            } else {
                if (!field.value.trim()) {
                    field.classList.add('field-error');
                    valid = false;
                } else {
                    field.classList.remove('field-error');
                }
            }
        });
        submitBtn.disabled = !valid;
    }

    requiredFields.forEach(field => {
        field.addEventListener('input', validateForm);
    });

    form.addEventListener('submit', function (e) {
        validateForm();
        if (submitBtn.disabled) {
            e.preventDefault();
            alertBox.textContent = "يرجى استكمال الحقول المطلوبة";
            alertBox.style.display = 'block';
        }
    });

    clearBtn.addEventListener('click', () => {
        form.reset();
        alertBox.style.display = 'none';
        requiredFields.forEach(f => f.classList.remove('field-error'));
        requiredFields[0].focus();
        submitBtn.disabled = true;
    });

    window.addEventListener('load', () => {
        validateForm();

        const urlParams = new URLSearchParams(window.location.search);
        const passedUserCode = urlParams.get("userCode");
        const loggedUserCode = sessionStorage.getItem("userCode");

        if (passedUserCode) {
            document.getElementById("reporterCode").value = passedUserCode;
        }

        if (loggedUserCode) {
            document.getElementById("createdBy").value = loggedUserCode;
        } else if (passedUserCode) {
            document.getElementById("createdBy").value = passedUserCode;
        }
    });
</script>
<script>
    async function loadGovernments(selectId) {
      const select = document.getElementById(selectId);
      if (!select) return;
      select.innerHTML = '<option value="">تحميل المحافظات...</option>';
      try {
        const res = await fetch('/api/locations/governments');
        const data = await res.json();
        select.innerHTML = '<option value="">اختر المحافظة...</option>';
        data.forEach(loc => {
          const opt = document.createElement("option");
          opt.value = loc.gov;
          opt.textContent = loc.description.trim();
          select.appendChild(opt);
        });
      } catch { select.innerHTML = '<option value="">تعذر تحميل المحافظات</option>'; }
    }
    async function loadCities(govCode, selectId) {
      const select = document.getElementById(selectId);
      if (!select) return;
      select.innerHTML = '<option value="">تحميل المدن...</option>';
      try {
        const res = await fetch(`/api/locations/cities/${govCode}`);
        const data = await res.json();
        select.innerHTML = '<option value="">اختر المدينة...</option>';
        data.forEach(loc => {
          const opt = document.createElement("option");
          opt.value = loc.pol;
          opt.textContent = loc.description.trim();
          select.appendChild(opt);
        });
      } catch { select.innerHTML = '<option value="">تعذر تحميل المدن</option>'; }
    }
    async function loadDistricts(govCode, cityCode, selectId) {
      const select = document.getElementById(selectId);
      if (!select) return;
      select.innerHTML = '<option value="">تحميل الأحياء...</option>';
      try {
        const res = await fetch(`/api/locations/zon1/${govCode}${cityCode}`);
        const data = await res.json();
        select.innerHTML = '<option value="">-- اختر الحي / المنطقة --</option>';
        data.forEach(loc => {
          const opt = document.createElement("option");
          opt.value = loc.zon1;
          opt.textContent = loc.description.trim();
          select.appendChild(opt);
        });
      } catch { select.innerHTML = '<option value="">تعذر تحميل الأحياء</option>'; }
    }
    document.addEventListener("DOMContentLoaded", () => {
      loadGovernments("homeGovernorate");
      document.getElementById("homeGovernorate").addEventListener("change", e => {
        loadCities(e.target.value, "homeCity");
        document.getElementById("homeDistrict").innerHTML = '<option value="">-- اختر الحي / المنطقة --</option>';
      });
      document.getElementById("homeCity").addEventListener("change", e => {
        loadDistricts(document.getElementById("homeGovernorate").value, e.target.value, "homeDistrict");
      });
      loadGovernments("lostGovernorate");
      document.getElementById("lostGovernorate").addEventListener("change", e => {
        loadCities(e.target.value, "lostCity");
        document.getElementById("lostDistrict").innerHTML = '<option value="">-- اختر الحي / المنطقة --</option>';
      });
      document.getElementById("lostCity").addEventListener("change", e => {
        loadDistricts(document.getElementById("lostGovernorate").value, e.target.value, "lostDistrict");
      });
    });
    document.getElementById("missingForm").addEventListener("submit", () => {
      const setHidden = (dropdownId, hiddenId) => {
        const sel = document.getElementById(dropdownId);
        if (sel && sel.selectedIndex > 0) {
          document.getElementById(hiddenId).value = sel.options[sel.selectedIndex].textContent.trim();
        }
        if (sel) sel.removeAttribute("name");
      };
      setHidden("homeGovernorate", "homeGovernorateName");
      setHidden("homeCity", "homeCityName");
      setHidden("homeDistrict", "homeDistrictName");
      setHidden("lostGovernorate", "lostGovernorateName");
      setHidden("lostCity", "lostCityName");
      setHidden("lostDistrict", "lostDistrictName");
    });
</script>
<script>
    // Enable "photo date" only when "photo" is uploaded
    document.addEventListener("DOMContentLoaded", () => {
        const photoInput = document.getElementById("photo");
        const photoDateInput = document.getElementById("photoDate");

        if (photoInput && photoDateInput) {
            photoInput.addEventListener("change", () => {
                if (photoInput.files.length > 0) {
                    photoDateInput.disabled = false;
                } else {
                    photoDateInput.value = "";
                    photoDateInput.disabled = true;
                }
            });
        }
    });
</script>

</body>
</html>
