<!DOCTYPE html>
<html lang="ar" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الشخص الغائب  missing-view.html</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light p-4">

<div class="container bg-white p-4 rounded shadow-sm">
    <h3 class="mb-4 text-center text-primary"> missing-view.html تفاصيل الشخص الغائب</h3>

    <div class="row mb-3">
        <label class="col-sm-3 fw-bold">الاسم الكامل:</label>
        <div class="col-sm-9" th:text="${missing.firstName + ' ' + missing.secondName + ' ' + missing.familyName}"></div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 fw-bold">تاريخ الميلاد:</label>
        <div class="col-sm-9" th:text="${missing.dob}"></div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 fw-bold">العمر:</label>
        <div class="col-sm-9" th:text="${missing.age}"></div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 fw-bold">الرقم القومي:</label>
        <div class="col-sm-9" th:text="${missing.nationalId}"></div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-3 fw-bold">صورة الشخص:</label>
        <div class="col-sm-9">
            <img th:if="${missing.photoUrl != null}" th:src="@{'/' + ${missing.photoUrl}}" class="img-thumbnail" style="max-width: 200px;">
            <span th:if="${missing.photoUrl == null}">---</span>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="javascript:history.back()" class="btn btn-secondary">رجوع</a>
    </div>
</div>

</body>
</html>
