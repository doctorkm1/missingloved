
<!DOCTYPE html>

<html dir="rtl" lang="ar" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>تفاصيل المفقود missing-detal-view.html </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet"/>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Tahoma', sans-serif;
        }
        .top-header {
            background-color: #111;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .breadcrumb-bar {
            background-color: #e9ecef;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            gap: 12px;
        }
        .photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 15px auto 10px; /* reduced top/bottom margins             margin: 40px auto 20px;  */
            width: 90%;
        }
        .photo-section img {
            width: 66%;
            max-width: 600px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .photo-section .back-btn {
            align-self: flex-start;
            margin-top: 10px;
            background-color: #6c757d;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .person-name {
            margin-top: 10px; /* reduced from 20px          margin-top: 20px;  */
            font-size: 20px;
            font-weight: bold;
            color: #b30000;
            text-align: center;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 15px auto; /* reduced from 30px        margin: 30px auto;  */
            width: 80%;
            max-width: 700px;
        }
        .details-grid div {
            background-color: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 18px;
        }
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            margin-bottom: 60px;
        }
        .action-bar button {
            padding: 14px 28px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .report-btn {
            background-color: #198754;
            color: white;
        }
        .share-btn {
            background-color: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>
<!-- Top row identical to homepage -->
<div class="top-header">
    <div style="display: flex; align-items: center; gap: 5px;">
    <img alt="Logo" src="/images/kk15.jpg" style="height: 70px;"/>
        <span style="margin-right: 10px">منصة لم شمل الأحباب</span>
    </div>
    <div>
        info@aalkamel.org | +201023255444
    </div>
</div>
<!-- Breadcrumb -->
<div class="breadcrumb-bar">
    <button onclick="location.href='/'" style="background:none;border:none;color:#0d6efd;cursor:pointer;">الرئيسية</button>
    <span>←</span>
    <button onclick="location.href='/#missingBanner'" style="background:none;border:none;color:#0d6efd;cursor:pointer;">هل رأيت أياً منهم؟</button>
    <span>←</span>

 <!--   <a href="/#missingBanner" class="btn btn-outline-primary btn-sm details-button">⬅️ إظهار التفاصيل</a>  -->

   <span th:text="${missing.firstName + ' ' + missing.secondName + ' ' + missing.familyName}">اسم الغائب</span>
</div>
<!-- Main Section -->
<div class="photo-section">
    <img alt="صورة المفقود"
         th:src="@{/uploads/missing/images/{file}(file=${missing.photoFileName})}"
         style="width: 30vw;" />
</div>
<!-- Name -->
<div class="person-name" th:text="${missing.firstName + ' ' + missing.secondName + ' ' + missing.familyName}">اسم المفقود</div>
<!-- Info Grid -->
<div class="details-grid">
    <div>العمر عند الغياب: <span th:text="${missing.age}">--</span></div>

    <div>مكان التغيب: <span th:text="${missing.lastSeenGovernorate + ' - ' + missing.lastSeenCity}">--</span></div>

<!--------
    <div>تاريخ الغياب: <span th:text="${#temporals.format(missing.lastSeenDate, 'yyyy-MM-dd')}">--</span></div>
----->
    <div style="
    text-align: center;
    font-size: 1.2em;
    line-height: 1.6;           /* Space between lines */
    width: 300px;               /* Width of the box */
    height: auto;               /* Height (auto or fixed e.g., 150px) */
    padding: 10px;              /* Space inside the box */
    border: 1px solid #ccc;     /* Optional: visible box border */
">
        تاريخ الغياب<br>
        <span th:text="${#temporals.format(missing.lastSeenDate, 'yyyy-MM-dd')}">--</span>
    </div>

    <!--    <div>الكود المرجعي: <span th:text="${missing.caseCode}">--</span></div>  -->

    <div style="
    text-align: center;
    font-size: 1.2em;
    line-height: 1.6;           /* Space between lines */
    width: 300px;               /* Width of the box */
    height: auto;               /* Height (auto or fixed e.g., 150px) */
    padding: 10px;              /* Space inside the box */
    border: 1px solid #ccc;     /* Optional: visible box border */
">
        الكود المرجعي<br>
        <span th:text="${missing.caseCode}">--</span>
<!--        <span th:text="${emissing.caseCod}">--</span>  -->
  </div>

    <!--    <div>الكود المرجعي: <br><span th:text="${missing.caseCode}">--</span></div>  -->
</div>

<!--- <a href="/reportmlcusrp?next=found/report" class="btn btn-primary mt-3">    🧾 الإبلاغ عن حالة عثور</a>  --->
<!-- Bottom Buttons -->
<div class="action-bar">
<!--    <a href="/#missingwatch" class="cta-button">إبلاغ عن مشاهدة</a>  -->
    <a class="btn btn-success"
       th:href="@{/reportmlcusrp(next='sightmis')}">        الإبلاغ عن مشاهدة
    </a>

<!--    <button class="report-btn" onclick="location.href='/#missingwatch'">الإبلاغ عن مشاهدة</button>  --->
<!--    <button class="report-btn">الإبلاغ عن مشاهدة</button> --->
    <button class="share-btn">المشاركة على شبكات التواصل الاجتماعى</button>
</div>
<script>
    // ✅ When user returns to home.html, scroll back to saved position
    window.addEventListener("DOMContentLoaded", () => {
      const scroll = sessionStorage.getItem("scrollTop");
      if (scroll !== null) {
        window.scrollTo(0, parseInt(scroll));
        sessionStorage.removeItem("scrollTop");
      }
    });
</script>

</body>
</html>
